version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: genvideo-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: genvideo
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - genvideo-network

  redis:
    image: redis:7
    container_name: genvideo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - genvideo-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: genvideo-backend
    ports:
      - "3004:3004"
    environment:
      GIN_MODE: release
      SERVER_PORT: "3004"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: genvideo
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - genvideo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: genvideo-frontend
    ports:
      - "3003:80"
    depends_on:
      - backend
    networks:
      - genvideo-network

networks:
  genvideo-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
